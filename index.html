<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор гербов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    background: #fff;
  }

  /* ── LEFT PANEL ── */
  #panel {
    width: 360px;
    min-width: 360px;
    background: #fff;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 32px 28px 120px;
    border-right: 1px solid #eee;
    position: relative;
  }

  .section { margin-bottom: 36px; }

  .section-title {
    font-weight: 500;
    font-size: 35px;
    color: #000;
    text-align: center;
    margin-bottom: 20px;
    display: block;
  }

  /* Shield shapes */
  .shield-row {
    display: flex;
    justify-content: center;
    gap: 24px;
  }

  .shield-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .shield-option svg {
    width: 70px;
    height: 80px;
    fill: #ccc;
    transition: fill 0.2s;
  }

  .shield-option.active svg { fill: #888; }
  .shield-option span {
    font-weight: 200;
    font-size: 20px;
    color: #000;
  }

  /* Color swatches */
  .color-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .swatch {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }

  .swatch.active { border-color: #000 !important; }

  .swatch-picker {
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    position: relative;
  }

  #colorInput {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    border-radius: 50%;
  }

  /* Stripes selector */
  .stripes-container {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
  }

  .stripes-labels {
    display: flex;
    justify-content: space-around;
  }

  .stripes-labels span {
    font-weight: 200;
    font-size: 25px;
    color: #000;
    cursor: pointer;
    width: 33.33%;
    text-align: center;
  }

  .stripes-bars {
    display: flex;
    gap: 4px;
    height: 14px;
  }

  .stripe-bar {
    flex: 1;
    border-radius: 3px;
    background: #ddd;
    transition: background 0.2s;
  }

  .stripe-bar.lit { background: var(--accent, #F0A030); }

  /* Animals grid */
  .animals-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .animal-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    width: 90px;
    padding: 6px;
    border-radius: 8px;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }

  .animal-option.active { border-color: #000; }

  .animal-thumb {
    width: 70px;
    height: 70px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .animal-thumb svg,
  .animal-thumb img {
    max-width: 70px;
    max-height: 70px;
    width: auto;
    height: auto;
    display: block;
  }

  .animal-option span {
    font-weight: 200;
    font-size: 20px;
    color: #000;
    text-align: center;
  }

  .show-more-btn {
    display: block;
    margin: 10px auto 0;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #666;
    padding: 4px 12px;
  }

  /* Text input */
  #textInput {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 25px;
    color: #000;
    resize: none;
    outline: none;
    height: 72px;
  }

  /* Bottom buttons */
  #bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 360px;
    background: #fff;
    border-top: 1px solid #eee;
    display: flex;
    justify-content: space-around;
    padding: 14px 20px;
    z-index: 100;
  }

  .bottom-btn {
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 30px;
    cursor: pointer;
    color: #000;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.2s;
  }

  .bottom-btn:hover { opacity: 0.6; }

  /* ── RIGHT PREVIEW ── */
  #preview {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.3s ease;
    background-color: var(--accent, #F0A030);
  }

  #shield-wrapper {
    position: relative;
    width: 380px;
    height: 460px;
    filter: drop-shadow(0px 12px 32px rgba(0,0,0,0.22));
  }

  #shield-svg {
    width: 100%;
    height: 100%;
  }

  /* loading state */
  .loading-thumb {
    width: 70px;
    height: 70px;
    background: #eee;
    border-radius: 4px;
  }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div id="panel">

  <!-- Shield shape -->
  <div class="section">
    <span class="section-title">Форма щита</span>
    <div class="shield-row">
      <div class="shield-option active" data-shield="1" onclick="selectShield(1)">
        <!-- Shield 1: Round bottom -->
        <svg viewBox="0 0 70 80" xmlns="http://www.w3.org/2000/svg">
          <path d="M5,5 H65 V48 Q65,78 35,78 Q5,78 5,48 Z"/>
        </svg>
        <span>Круглый</span>
      </div>
      <div class="shield-option" data-shield="2" onclick="selectShield(2)">
        <!-- Shield 2: Pointed bottom -->
        <svg viewBox="0 0 70 80" xmlns="http://www.w3.org/2000/svg">
          <path d="M5,5 H65 V50 Q65,68 35,78 Q5,68 5,50 Z"/>
        </svg>
        <span>Защип</span>
      </div>
      <div class="shield-option" data-shield="3" onclick="selectShield(3)">
        <!-- Shield 3: Ticket/badge with notch at top -->
        <svg viewBox="0 0 70 80" xmlns="http://www.w3.org/2000/svg">
          <path d="M5,5 H30 L35,12 L40,5 H65 V70 Q65,78 57,78 H13 Q5,78 5,70 Z"/>
        </svg>
        <span>Билет</span>
      </div>
    </div>
  </div>

  <!-- Color -->
  <div class="section">
    <span class="section-title">Цвет</span>
    <div class="color-grid">
      <div class="swatch active" style="background:#2B5BE0" data-color="#2B5BE0" onclick="selectColor('#2B5BE0', this)"></div>
      <div class="swatch" style="background:#E02B2B" data-color="#E02B2B" onclick="selectColor('#E02B2B', this)"></div>
      <div class="swatch" style="background:#F0A030" data-color="#F0A030" onclick="selectColor('#F0A030', this)"></div>
      <div class="swatch" style="background:#E02BE0" data-color="#E02BE0" onclick="selectColor('#E02BE0', this)"></div>
      <div class="swatch" style="background:#2BE02B" data-color="#2BE02B" onclick="selectColor('#2BE02B', this)"></div>
      <div class="swatch" style="background:#111111" data-color="#111111" onclick="selectColor('#111111', this)"></div>
      <div class="swatch" style="background:#2BE0E0" data-color="#2BE0E0" onclick="selectColor('#2BE0E0', this)"></div>
      <div class="swatch" style="background:#E0E02B" data-color="#E0E02B" onclick="selectColor('#E0E02B', this)"></div>
      <div class="swatch" style="background:#7B2BE0" data-color="#7B2BE0" onclick="selectColor('#7B2BE0', this)"></div>
      <div class="swatch swatch-picker" onclick="document.getElementById('colorInput').click()">
        <input type="color" id="colorInput" value="#F0A030" onchange="selectColor(this.value, this.parentElement)">
      </div>
    </div>
  </div>

  <!-- Stripes -->
  <div class="section">
    <span class="section-title">Полоски</span>
    <div class="stripes-container">
      <div class="stripes-labels">
        <span onclick="selectStripes(2)">2</span>
        <span onclick="selectStripes(4)">4</span>
        <span onclick="selectStripes(6)">6</span>
      </div>
      <div class="stripes-bars" id="stripeBars">
        <div class="stripe-bar lit"></div>
        <div class="stripe-bar lit"></div>
        <div class="stripe-bar"></div>
      </div>
    </div>
  </div>

  <!-- Animals -->
  <div class="section">
    <span class="section-title">Животное</span>
    <div class="animals-grid" id="animalsGrid"></div>
    <button class="show-more-btn" id="showMoreBtn" onclick="toggleAnimals()">∨</button>
  </div>

  <!-- Text -->
  <div class="section">
    <span class="section-title">Текст</span>
    <textarea id="textInput" placeholder="Фрейм" oninput="state.text = this.value; render()"></textarea>
  </div>

</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <button class="bottom-btn" onclick="randomize()">🔀 Случайный</button>
  <button class="bottom-btn" onclick="exportSVG()">↓ SVG</button>
</div>

<!-- RIGHT PREVIEW -->
<div id="preview">
  <div id="shield-wrapper">
    <svg id="shield-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 460"></svg>
  </div>
</div>

<script>
// ── CONFIG ──
const REPO = 'https://raw.githubusercontent.com/egorkalihanov2-create/heraldic/main/';

const ANIMALS = [
  { name: 'Верблюд',  file: 'Верблюд.svg'  },
  { name: 'Дракон',   file: 'Дракон.svg'   },
  { name: 'Единорог', file: 'Единорог.svg' },
  { name: 'Енот',     file: 'Енот.svg'     },
  { name: 'Козлёнок', file: 'Козлёнок.svg' },
  { name: 'Котёнок',  file: 'Котёнок.svg'  },
  { name: 'Крокодил', file: 'Крокодил.svg' },
  { name: 'Лев',      file: 'Лев.svg'      },
  { name: 'Медведь',  file: 'Медведь.svg'  },
  { name: 'Обезьяна', file: 'Обезьяна.svg' },
  { name: 'Павлин',   file: 'Павлин.svg'   },
  { name: 'Петух',    file: 'Петух.svg'    },
  { name: 'Слон',     file: 'Слон.svg'     },
  { name: 'Сокол',    file: 'Сокол.svg'    },
];

const SHIELD_PATHS = {
  1: 'M10,10 H370 V300 Q370,450 190,450 Q10,450 10,300 Z',
  2: 'M10,10 H370 V310 Q370,390 190,450 Q10,390 10,310 Z',
  3: 'M10,10 H168 L190,38 L212,10 H370 V420 Q370,450 340,450 H40 Q10,450 10,420 Z',
};

// stripes tab positions on shield (y center, for each of 6 stripes)
const STRIPE_HEIGHT = 28;
const STRIPE_GAP    = 6;

// ── STATE ──
const state = {
  shield: 1,
  color:  '#2B5BE0',
  stripes: 4,
  animal: 'Лев',
  text: 'Фрейм',
};

// SVG cache
const svgCache = {};
let showAll = false;

// ── INIT ──
async function init() {
  buildAnimalGrid();
  // preload selected animal
  await loadAnimalSVG(state.animal);
  applyColorCSS(state.color);
  render();
}

function buildAnimalGrid() {
  const grid = document.getElementById('animalsGrid');
  grid.innerHTML = '';
  const count = showAll ? ANIMALS.length : Math.min(6, ANIMALS.length);
  for (let i = 0; i < count; i++) {
    const a = ANIMALS[i];
    const div = document.createElement('div');
    div.className = 'animal-option' + (a.name === state.animal ? ' active' : '');
    div.dataset.name = a.name;
    div.onclick = () => selectAnimal(a.name);

    const thumb = document.createElement('div');
    thumb.className = 'animal-thumb';
    thumb.id = 'thumb-' + a.name;

    const label = document.createElement('span');
    label.textContent = a.name;

    div.appendChild(thumb);
    div.appendChild(label);
    grid.appendChild(div);

    // async load thumb
    loadAnimalSVG(a.name).then(svgStr => {
      const el = document.getElementById('thumb-' + a.name);
      if (el) {
        el.innerHTML = coloredSVG(svgStr, state.color);
        // scale thumb svg
        const s = el.querySelector('svg');
        if (s) {
          s.style.maxWidth = '70px';
          s.style.maxHeight = '70px';
          s.style.width = 'auto';
          s.style.height = 'auto';
        }
      }
    });
  }
  document.getElementById('showMoreBtn').textContent = showAll ? '∧' : '∨';
}

async function loadAnimalSVG(name) {
  if (svgCache[name]) return svgCache[name];
  const file = ANIMALS.find(a => a.name === name)?.file;
  if (!file) return '';
  try {
    const url = REPO + encodeURIComponent(file);
    const r = await fetch(url);
    if (!r.ok) throw new Error('not found');
    const text = await r.text();
    svgCache[name] = text;
    return text;
  } catch(e) {
    // fallback placeholder
    const ph = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="8" fill="currentColor" opacity="0.3"/><text x="50" y="55" text-anchor="middle" font-size="12" fill="currentColor">${name}</text></svg>`;
    svgCache[name] = ph;
    return ph;
  }
}

// ── RENDER ──
async function render() {
  const svg = document.getElementById('shield-svg');
  const path = SHIELD_PATHS[state.shield];
  const c = state.color;
  const text = state.text || '';

  // Load animal
  const rawAnimal = await loadAnimalSVG(state.animal);

  // Get animal inner content (strip outer <svg> tag, keep viewBox)
  const animalViewBox = getViewBox(rawAnimal);
  const animalInner = getInnerSVG(rawAnimal);

  // We'll place animal in a 280x280 box centered horizontally at x=50 (left-align to text left)
  // Text left boundary on shield
  const shieldLeft = 40;   // left padding inside shield
  const shieldRight = 340; // right padding
  const shieldWidth = shieldRight - shieldLeft; // 300

  // Compute font size (auto-shrink)
  const fontSize = computeFontSize(text, shieldWidth);

  // Stripes geometry
  const stripesHTML = buildStripes(state.stripes, path, c);

  // Animal box: left-align with text left edge
  const animalX = shieldLeft;
  const animalY = 80 + fontSize + 10; // below text
  const animalW = shieldWidth;
  const animalH = 460 - animalY - 20;

  svg.setAttribute('viewBox', '0 0 380 460');
  svg.innerHTML = `
    <defs>
      <clipPath id="shieldClip">
        <path d="${path}"/>
      </clipPath>
    </defs>

    <!-- Shield white bg -->
    <path d="${path}" fill="#ffffff"/>

    <!-- Stripes (clip to shield) -->
    <g clip-path="url(#shieldClip)">
      ${stripesHTML}
    </g>

    <!-- Animal (inside shield) -->
    <g clip-path="url(#shieldClip)">
      <svg x="${animalX}" y="${animalY}" width="${animalW}" height="${animalH}"
           viewBox="${animalViewBox}" preserveAspectRatio="xMidYMax meet">
        <g fill="${c}">${animalInner}</g>
      </svg>
    </g>

    <!-- Text (inside shield, left-aligned to animal left) -->
    <g clip-path="url(#shieldClip)">
      <text
        x="${shieldLeft}"
        y="${80 + fontSize}"
        font-family="Inter, sans-serif"
        font-weight="500"
        font-size="${fontSize}"
        letter-spacing="-${Math.round(fontSize * 0.076)}"
        fill="${c}"
        text-anchor="start"
        dominant-baseline="auto"
      >${escapeXML(text)}</text>
    </g>

    <!-- Shield outline -->
    <path d="${path}" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="2"/>
  `;

  // Update thumbs color
  updateThumbColors();
}

function buildStripes(count, path, color) {
  // Stripes sit at the very top of the shield, partially protruding
  // width spans full shield width (10 to 370)
  const totalW = 360;
  const startX = 10;
  const h = STRIPE_HEIGHT;
  const gap = STRIPE_GAP;
  const totalStripeW = (totalW - (count - 1) * gap) / count;
  let html = '';
  for (let i = 0; i < count; i++) {
    const x = startX + i * (totalStripeW + gap);
    // position: top of shield is y=10, stripes protrude above by ~h/2
    html += `<rect x="${x}" y="${-2}" width="${totalStripeW}" height="${h + 16}" rx="3" fill="${color}"/>`;
  }
  return html;
}

function computeFontSize(text, maxWidth) {
  if (!text) return 131;
  // Approximate: Inter Medium char width ≈ 0.62 * fontSize (with tight tracking)
  let size = 131;
  const minSize = 32;
  while (size > minSize) {
    const approxW = text.length * size * 0.58;
    if (approxW <= maxWidth) break;
    size -= 2;
  }
  return size;
}

function getViewBox(svgStr) {
  const m = svgStr.match(/viewBox=["']([^"']+)["']/);
  return m ? m[1] : '0 0 100 100';
}

function getInnerSVG(svgStr) {
  return svgStr.replace(/<svg[^>]*>/, '').replace(/<\/svg>/, '');
}

function coloredSVG(svgStr, color) {
  // Replace fill colors with chosen color, preserve structure
  let out = svgStr
    .replace(/fill="[^"]*"/g, `fill="${color}"`)
    .replace(/fill:[^;}"']+/g, `fill:${color}`);
  return out;
}

function escapeXML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateThumbColors() {
  ANIMALS.forEach(a => {
    const el = document.getElementById('thumb-' + a.name);
    if (el && svgCache[a.name]) {
      el.innerHTML = coloredSVG(svgCache[a.name], state.color);
      const s = el.querySelector('svg');
      if (s) {
        s.style.maxWidth = '70px';
        s.style.maxHeight = '70px';
        s.style.width = 'auto';
        s.style.height = 'auto';
      }
    }
  });
}

// ── CONTROLS ──
function selectShield(n) {
  state.shield = n;
  document.querySelectorAll('.shield-option').forEach(el => {
    el.classList.toggle('active', +el.dataset.shield === n);
  });
  render();
}

function selectColor(hex, el) {
  state.color = hex;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  if (el && el.classList) el.classList.add('active');
  applyColorCSS(hex);
  updateStripesBars();
  render();
}

function applyColorCSS(hex) {
  document.documentElement.style.setProperty('--accent', hex);
  document.getElementById('preview').style.backgroundColor = hex;
  // update stripe bars
  updateStripesBars();
}

function selectStripes(n) {
  state.stripes = n;
  updateStripesBars();
  render();
}

function updateStripesBars() {
  const bars = document.querySelectorAll('.stripe-bar');
  // 3 bars: bar[0]=2, bar[1]=4, bar[2]=6
  // bar is lit if its threshold <= state.stripes
  const thresholds = [2, 4, 6];
  bars.forEach((bar, i) => {
    bar.style.background = (thresholds[i] <= state.stripes) ? state.color : '#ddd';
  });
}

async function selectAnimal(name) {
  state.animal = name;
  document.querySelectorAll('.animal-option').forEach(el => {
    el.classList.toggle('active', el.dataset.name === name);
  });
  await loadAnimalSVG(name);
  render();
}

function toggleAnimals() {
  showAll = !showAll;
  buildAnimalGrid();
}

function randomize() {
  const shields = [1, 2, 3];
  const colors  = ['#2B5BE0','#E02B2B','#F0A030','#E02BE0','#2BE02B',
                   '#111111','#2BE0E0','#E0E02B','#7B2BE0'];
  const stripeCounts = [2, 4, 6];

  state.shield  = shields[Math.floor(Math.random() * shields.length)];
  state.color   = colors[Math.floor(Math.random() * colors.length)];
  state.stripes = stripeCounts[Math.floor(Math.random() * stripeCounts.length)];
  state.animal  = ANIMALS[Math.floor(Math.random() * ANIMALS.length)].name;

  // Update UI
  document.querySelectorAll('.shield-option').forEach(el => {
    el.classList.toggle('active', +el.dataset.shield === state.shield);
  });
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  applyColorCSS(state.color);
  updateStripesBars();
  buildAnimalGrid();
  render();
}

async function exportSVG() {
  // Build clean SVG without background
  const shieldSVG = document.getElementById('shield-svg');
  const content = shieldSVG.innerHTML;
  const blob = new Blob([
    `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 460" width="380" height="460">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&amp;display=swap');</style>
  </defs>
  ${content}
</svg>`
  ], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'герб.svg';
  a.click();
  URL.revokeObjectURL(url);
}

// ── START ──
// Initial color sync
document.getElementById('preview').style.backgroundColor = state.color;
updateStripesBars();
init();
</script>
</body>
</html>
