<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор гербов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    background: #fff;
  }

  /* ── LEFT PANEL ── */
  #panel {
    width: 370px;
    min-width: 370px;
    background: #fff;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 28px 28px 100px;
    border-right: 1px solid #eee;
  }

  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  .section { margin-bottom: 32px; }

  .section-title {
    font-weight: 500;
    font-size: 35px;
    letter-spacing: -1.4px;
    color: #000;
    text-align: center;
    margin-bottom: 18px;
    display: block;
  }

  /* ── SHIELD SHAPES ── */
  .shield-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    align-items: flex-end;
  }

  .shield-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .shield-option .shield-icon {
    width: 68px;
    height: 80px;
    fill: #c8c8c8;
    transition: fill 0.15s;
    display: block;
  }

  .shield-option.active .shield-icon { fill: #888; }

  .shield-option span {
    font-weight: 200;
    font-size: 20px;
    letter-spacing: -0.8px;
    color: #000;
  }

  /* ── COLOR SWATCHES ── */
  .color-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }

  .swatch {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: border-color 0.15s;
    flex-shrink: 0;
    position: relative;
  }

  .swatch.active { border-color: #000 !important; }

  .swatch-picker {
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    overflow: hidden;
  }

  #colorInput {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    border-radius: 50%;
  }

  /* ── STRIPES ── */
  .stripes-container { display: flex; flex-direction: column; gap: 8px; }

  .stripes-labels {
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
  }

  .stripes-label-item {
    flex: 1;
    text-align: center;
    font-weight: 200;
    font-size: 25px;
    letter-spacing: -1px;
    color: #000;
    cursor: pointer;
  }

  .stripes-bars {
    display: flex;
    gap: 6px;
    height: 12px;
  }

  .stripe-bar {
    flex: 1;
    border-radius: 4px;
    background: #e0e0e0;
    transition: background 0.2s;
    cursor: pointer;
  }

  /* ── ANIMALS ── */
  .animals-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .animal-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    width: 88px;
    padding: 6px 4px;
    border-radius: 8px;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }

  .animal-option.active { border-color: #000; }

  .animal-thumb {
    width: 72px;
    height: 72px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
  }

  .animal-thumb svg {
    max-width: 72px;
    max-height: 72px;
    width: auto;
    height: auto;
  }

  .animal-option span {
    font-weight: 200;
    font-size: 20px;
    letter-spacing: -0.8px;
    color: #000;
    text-align: center;
    line-height: 1.2;
  }

  .show-more-btn {
    display: block;
    margin: 8px auto 0;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #999;
    padding: 4px 16px;
  }

  /* ── TEXT INPUT ── */
  #textInput {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 25px;
    letter-spacing: -1px;
    color: #000;
    resize: none;
    outline: none;
    height: 68px;
  }

  #textInput::placeholder { color: #aaa; }

  /* ── BOTTOM BAR ── */
  #bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 370px;
    background: #fff;
    border-top: 1px solid #eee;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 12px 20px;
    z-index: 100;
  }

  .bottom-btn {
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 30px;
    letter-spacing: -1.2px;
    cursor: pointer;
    color: #000;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.2s;
  }

  .bottom-btn:hover { opacity: 0.5; }

  /* ── RIGHT PREVIEW ── */
  #preview {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.3s ease;
  }

  #shield-wrapper {
    filter: drop-shadow(0px 10px 30px rgba(0,0,0,0.20));
    overflow: visible;
  }

  #shield-svg {
    display: block;
    overflow: visible;
  }
</style>
</head>
<body>

<div id="panel">

  <div class="section">
    <span class="section-title">Форма щита</span>
    <div class="shield-row">

      <div class="shield-option active" data-shield="1" onclick="selectShield(1)">
        <svg class="shield-icon" viewBox="0 0 68 80" xmlns="http://www.w3.org/2000/svg">
          <path d="M4,4 H64 V46 C64,64 34,76 34,76 C34,76 4,64 4,46 Z"/>
        </svg>
        <span>Круглый</span>
      </div>

      <div class="shield-option" data-shield="2" onclick="selectShield(2)">
        <svg class="shield-icon" viewBox="0 0 68 80" xmlns="http://www.w3.org/2000/svg">
          <path d="M4,4 H64 V44 C64,60 48,72 34,78 C20,72 4,60 4,44 Z"/>
        </svg>
        <span>Защип</span>
      </div>

      <div class="shield-option" data-shield="3" onclick="selectShield(3)">
        <svg class="shield-icon" viewBox="0 0 68 80" xmlns="http://www.w3.org/2000/svg">
          <path d="M4,4 H28 L34,14 L40,4 H64 V68 C64,74 58,78 52,78 H16 C10,78 4,74 4,68 Z"/>
        </svg>
        <span>Билет</span>
      </div>

    </div>
  </div>

  <div class="section">
    <span class="section-title">Цвет</span>
    <div class="color-grid">
      <div class="swatch" style="background:#2B5BE0" data-color="#2B5BE0" onclick="selectColor('#2B5BE0',this)"></div>
      <div class="swatch" style="background:#E02B2B" data-color="#E02B2B" onclick="selectColor('#E02B2B',this)"></div>
      <div class="swatch" style="background:#F0A030" data-color="#F0A030" onclick="selectColor('#F0A030',this)"></div>
      <div class="swatch" style="background:#E020C8" data-color="#E020C8" onclick="selectColor('#E020C8',this)"></div>
      <div class="swatch" style="background:#18CC18" data-color="#18CC18" onclick="selectColor('#18CC18',this)"></div>
      <div class="swatch" style="background:#111111" data-color="#111111" onclick="selectColor('#111111',this)"></div>
      <div class="swatch" style="background:#18CCCC" data-color="#18CCCC" onclick="selectColor('#18CCCC',this)"></div>
      <div class="swatch" style="background:#D4D418" data-color="#D4D418" onclick="selectColor('#D4D418',this)"></div>
      <div class="swatch" style="background:#7B2BE0" data-color="#7B2BE0" onclick="selectColor('#7B2BE0',this)"></div>
      <div class="swatch swatch-picker" title="Выбрать цвет">
        <input type="color" id="colorInput" value="#2B5BE0" oninput="selectColor(this.value,this.parentElement)">
      </div>
    </div>
  </div>

  <div class="section">
    <span class="section-title">Полоски</span>
    <div class="stripes-container">
      <div class="stripes-labels">
        <span class="stripes-label-item" onclick="selectStripes(2)">2</span>
        <span class="stripes-label-item" onclick="selectStripes(4)">4</span>
        <span class="stripes-label-item" onclick="selectStripes(6)">6</span>
      </div>
      <div class="stripes-bars" id="stripeBars">
        <div class="stripe-bar" onclick="selectStripes(2)"></div>
        <div class="stripe-bar" onclick="selectStripes(4)"></div>
        <div class="stripe-bar" onclick="selectStripes(6)"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <span class="section-title">Животное</span>
    <div class="animals-grid" id="animalsGrid"></div>
    <button class="show-more-btn" id="showMoreBtn" onclick="toggleAnimals()">∨</button>
  </div>

  <div class="section">
    <span class="section-title">Текст</span>
    <textarea id="textInput" placeholder="Фрейм" oninput="state.text=this.value;render()"></textarea>
  </div>

</div>

<div id="bottom-bar">
  <button class="bottom-btn" onclick="randomize()">🔀 Случайный</button>
  <button class="bottom-btn" onclick="exportSVG()">↓ SVG</button>
</div>

<div id="preview">
  <div id="shield-wrapper">
    <svg id="shield-svg" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"></svg>
  </div>
</div>

<script>
const REPO = 'https://raw.githubusercontent.com/egorkalihanov2-create/heraldic/main/';

const ANIMALS = [
  {name:'Верблюд',  file:'Верблюд.svg'},
  {name:'Дракон',   file:'Дракон.svg'},
  {name:'Единорог', file:'Единорог.svg'},
  {name:'Енот',     file:'Енот.svg'},
  {name:'Козлёнок', file:'Козлёнок.svg'},
  {name:'Котёнок',  file:'Котёнок.svg'},
  {name:'Крокодил', file:'Крокодил.svg'},
  {name:'Лев',      file:'Лев.svg'},
  {name:'Медведь',  file:'Медведь.svg'},
  {name:'Обезьяна', file:'Обезьяна.svg'},
  {name:'Павлин',   file:'Павлин.svg'},
  {name:'Петух',    file:'Петух.svg'},
  {name:'Слон',     file:'Слон.svg'},
  {name:'Сокол',    file:'Сокол.svg'},
];

// Shield paths in 380x470 canvas
// Shield body: x 10–370, top y=30 (leaves room for stripes above), bottom varies
const SHIELD_PATHS = {
  // Classic heater: straight top, curves to round point
  1: 'M10,30 H370 V300 C370,390 280,440 190,455 C100,440 10,390 10,300 Z',
  // Pointed/Heater: tapers to sharper point
  2: 'M10,30 H370 V285 C370,365 270,425 190,458 C110,425 10,365 10,285 Z',
  // Ticket/Badge: notch top center, rounded bottom corners
  3: 'M10,30 H162 L190,60 L218,30 H370 V415 C370,438 352,455 330,455 H50 C28,455 10,438 10,415 Z',
};

// Stripe config: stripes sit above shield top (y=30), protrude upward
const STRIPE_Y_BOTTOM = 30; // bottom of stripes = shield top
const STRIPE_H = 32;
const STRIPE_Y = STRIPE_Y_BOTTOM - STRIPE_H + 10; // overlap shield by 10px
const STRIPE_GAP = 8;
const STRIPE_X = 10;
const STRIPE_TOTAL_W = 360; // 370-10

const state = {
  shield: 1,
  color:  '#2B5BE0',
  stripes: 4,
  animal: 'Лев',
  text: 'Фрейм',
};

const svgCache = {};
let showAll = false;

async function init() {
  document.querySelectorAll('.swatch')[0].classList.add('active');
  document.getElementById('preview').style.backgroundColor = state.color;
  document.getElementById('textInput').value = state.text;
  updateStripesBars();
  buildAnimalGrid();
  await loadAnimalSVG(state.animal);
  render();
}

function buildAnimalGrid() {
  const grid = document.getElementById('animalsGrid');
  grid.innerHTML = '';
  const count = showAll ? ANIMALS.length : Math.min(6, ANIMALS.length);
  for (let i = 0; i < count; i++) {
    const a = ANIMALS[i];
    const div = document.createElement('div');
    div.className = 'animal-option' + (a.name === state.animal ? ' active' : '');
    div.dataset.name = a.name;
    div.onclick = () => selectAnimal(a.name);

    const thumb = document.createElement('div');
    thumb.className = 'animal-thumb';
    thumb.id = 'thumb-' + a.name;
    thumb.innerHTML = `<svg viewBox="0 0 72 72"><rect width="72" height="72" rx="4" fill="#eee"/></svg>`;

    const label = document.createElement('span');
    label.textContent = a.name;

    div.appendChild(thumb);
    div.appendChild(label);
    grid.appendChild(div);

    loadAnimalSVG(a.name).then(() => refreshThumb(a.name));
  }
  document.getElementById('showMoreBtn').textContent = showAll ? '∧' : '∨';
}

function refreshThumb(name) {
  const el = document.getElementById('thumb-' + name);
  if (!el || !svgCache[name]) return;
  el.innerHTML = recolorSVG(svgCache[name], state.color);
  const s = el.querySelector('svg');
  if (s) {
    s.style.cssText = 'max-width:72px;max-height:72px;width:auto;height:auto;display:block;';
  }
}

async function loadAnimalSVG(name) {
  if (svgCache[name]) return svgCache[name];
  const entry = ANIMALS.find(a => a.name === name);
  if (!entry) return '';
  try {
    const r = await fetch(REPO + encodeURIComponent(entry.file));
    if (!r.ok) throw 0;
    const t = await r.text();
    svgCache[name] = t;
    return t;
  } catch {
    const ph = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="8" fill="currentColor" opacity="0.2"/></svg>`;
    svgCache[name] = ph;
    return ph;
  }
}

async function render() {
  const svg = document.getElementById('shield-svg');
  const path = SHIELD_PATHS[state.shield];
  const c = state.color;
  const text = (state.text || '').trim();
  const W = 380, H = 470;

  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const rawAnimal = await loadAnimalSVG(state.animal);
  const animalVB = getViewBox(rawAnimal);
  const animalInner = getInnerSVG(rawAnimal);

  // Text sizing
  const padL = 28, padR = 28;
  const innerW = W - padL - padR; // 324
  let fs = 131;
  if (text.length > 0) {
    while (fs > 32 && text.length * fs * 0.60 > innerW) fs -= 3;
  }
  const ls = -(fs * 0.076);
  const textTop = 40; // distance from shield top (y=30) to top of text
  const textY = STRIPE_Y_BOTTOM + textTop + fs; // baseline

  // Animal area
  const animalTop = textY + 12;
  const animalH = H - animalTop - 14;

  // Stripes
  const stripesHTML = makeStripes(state.stripes, c);

  svg.innerHTML = `
    <defs>
      <clipPath id="sc">
        <path d="${path}"/>
      </clipPath>
    </defs>

    <!-- Shield white -->
    <path d="${path}" fill="#fff"/>

    <!-- Stripes (above shield, no clip) -->
    ${stripesHTML}

    <!-- Animal -->
    <g clip-path="url(#sc)">
      <svg x="${padL}" y="${animalTop}" width="${innerW}" height="${animalH}"
           viewBox="${animalVB}" preserveAspectRatio="xMidYMax meet">
        <g fill="${c}" stroke="none">${animalInner}</g>
      </svg>
    </g>

    <!-- Text -->
    <g clip-path="url(#sc)">
      <text x="${padL}" y="${textY}"
        font-family="Inter,sans-serif" font-weight="500"
        font-size="${fs}" letter-spacing="${ls.toFixed(1)}"
        fill="${c}" text-anchor="start">${escXML(text)}</text>
    </g>

    <!-- Shield border -->
    <path d="${path}" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="2"/>
  `;

  ANIMALS.forEach(a => refreshThumb(a.name));
}

function makeStripes(count, color) {
  const gap = STRIPE_GAP;
  const sw = (STRIPE_TOTAL_W - (count - 1) * gap) / count;
  let h = '';
  for (let i = 0; i < count; i++) {
    const x = STRIPE_X + i * (sw + gap);
    h += `<rect x="${x.toFixed(1)}" y="${STRIPE_Y}" width="${sw.toFixed(1)}" height="${STRIPE_H}" rx="3" fill="${color}"/>`;
  }
  return h;
}

function getViewBox(s) {
  const m = s.match(/viewBox=["']([^"']+)["']/i);
  return m ? m[1] : '0 0 100 100';
}

function getInnerSVG(s) {
  return s.replace(/<\?xml[^>]*>/gi,'').replace(/<!DOCTYPE[^>]*>/gi,'')
          .replace(/<svg[^>]*>/i,'').replace(/<\/svg>/i,'').trim();
}

function recolorSVG(s, color) {
  return s.replace(/fill\s*=\s*["'](?!none)[^"']*["']/gi, `fill="${color}"`)
          .replace(/fill\s*:\s*(?!none)[^;}"'\s]+/gi, `fill:${color}`);
}

function escXML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectShield(n) {
  state.shield = n;
  document.querySelectorAll('.shield-option').forEach(e => e.classList.toggle('active', +e.dataset.shield === n));
  render();
}

function selectColor(hex, el) {
  state.color = hex;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  if (el?.classList) el.classList.add('active');
  document.getElementById('preview').style.backgroundColor = hex;
  updateStripesBars();
  render();
}

function selectStripes(n) {
  state.stripes = n;
  updateStripesBars();
  render();
}

function updateStripesBars() {
  document.querySelectorAll('.stripe-bar').forEach((bar, i) => {
    bar.style.background = [2,4,6][i] <= state.stripes ? state.color : '#e0e0e0';
  });
}

async function selectAnimal(name) {
  state.animal = name;
  document.querySelectorAll('.animal-option').forEach(e => e.classList.toggle('active', e.dataset.name === name));
  await loadAnimalSVG(name);
  render();
}

function toggleAnimals() {
  showAll = !showAll;
  buildAnimalGrid();
  ANIMALS.forEach(a => { if (svgCache[a.name]) refreshThumb(a.name); });
}

function randomize() {
  const colors = ['#2B5BE0','#E02B2B','#F0A030','#E020C8','#18CC18','#111111','#18CCCC','#D4D418','#7B2BE0'];
  state.shield  = [1,2,3][Math.floor(Math.random()*3)];
  state.color   = colors[Math.floor(Math.random()*colors.length)];
  state.stripes = [2,4,6][Math.floor(Math.random()*3)];
  state.animal  = ANIMALS[Math.floor(Math.random()*ANIMALS.length)].name;
  document.querySelectorAll('.shield-option').forEach(e => e.classList.toggle('active', +e.dataset.shield === state.shield));
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  document.getElementById('preview').style.backgroundColor = state.color;
  updateStripesBars();
  buildAnimalGrid();
  render();
}

function exportSVG() {
  const inner = document.getElementById('shield-svg').innerHTML;
  const blob = new Blob([
    `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="380" height="470" viewBox="0 0 380 470" style="overflow:visible">\n<defs><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&amp;display=swap');</style></defs>\n${inner}\n</svg>`
  ], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'герб.svg';
  a.click();
}

init();
</script>
</body>
</html>
